<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4ecd8" />
    <title>puzzles · nugo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4ecd8;
        --bg-2: #ece0c4;
        --ink: #3b3024;
        --ink-soft: #7a6a52;
        --card-back: #b9a983;
        --card-face: #fffaf0;
        --accent: #e07a5f;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: 'Nunito', system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 50% 0%, var(--bg) 0%, var(--bg-2) 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main { width: 100%; max-width: 460px; text-align: center; }
      h1 {
        font-family: 'Silkscreen', monospace;
        font-size: clamp(22px, 8vw, 34px);
        letter-spacing: 1px;
        margin: 0 0 8px;
      }
      .tagline { color: var(--ink-soft); font-weight: 600; margin: 0 0 28px; }
      .games { display: grid; gap: 14px; }
      a.game {
        display: flex;
        align-items: center;
        gap: 14px;
        text-decoration: none;
        color: var(--ink);
        background: var(--card-face);
        border: 2px solid var(--card-back);
        border-radius: 14px;
        padding: 16px 18px;
        transition: border-color 0.15s ease, transform 0.1s ease;
      }
      a.game:hover { border-color: var(--accent); transform: translateY(-2px); }
      .emoji { font-size: 34px; line-height: 1; }
      .meta { text-align: left; }
      .meta .name { font-weight: 800; font-size: 18px; }
      .meta .desc { color: var(--ink-soft); font-size: 14px; }
      footer { margin-top: 32px; color: var(--ink-soft); font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <h1>puzzles</h1>
      <p class="tagline">작고 포근한 퍼즐 게임 모음</p>
      <div class="games">
        <a class="game" href="./remember/">
          <span class="emoji">🎵</span>
          <span class="meta">
            <span class="name">remember</span>
            <span class="desc">짝을 맞춰 멜로디를 완성하는 픽셀 메모리</span>
          </span>
        </a>
        <a class="game" href="./railroad/">
          <span class="emoji">🚂</span>
          <span class="meta">
            <span class="name">railroad</span>
            <span class="desc">기찻길을 회전해 잇는 데일리 퍼즐 · 글로벌 리더보드</span>
          </span>
        </a>
      </div>
      <footer>nugo.cc</footer>
    </main>
  </body>
</html>
